substitutions:
  device_name: ble-proxy-theater
  friendly_name: BLE Proxy Theater
  room: theater_room

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ESP32-WROOM Bluetooth proxy. Replaces the ESPresense node previously at this location.

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0  # disable serial logging — frees the UART pins and reduces interrupt load

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s  # don't reboot on momentary HA disconnects

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_fallback_password
  power_save_mode: none  # keeps WiFi reliable; BLE proxies are USB-powered so no battery cost

captive_portal:

# Bluetooth proxy with active scanning. Active mode sends scan requests to
# advertising devices, which makes iBeacons (like Murphy) respond faster and
# more reliably than passive-only mode. Passive is fine if you're seeing too
# much WiFi/BT contention.
bluetooth_proxy:
  active: true

# Diagnostic entities — handy when validating the rollout.
text_sensor:
  - platform: version
    name: ESPHome version

sensor:
  - platform: uptime
    name: Uptime
  - platform: wifi_signal
    name: WiFi signal
    update_interval: 60s
  - platform: internal_temperature
    name: Internal temperature
    update_interval: 120s

binary_sensor:
  - platform: status
    name: Online status
