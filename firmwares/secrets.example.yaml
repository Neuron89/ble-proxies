# Copy to secrets.yaml in your ESPHome dashboard. Generate fresh keys with:
#   api_encryption_key: openssl rand -base64 32
#   ota_password / wifi_fallback_password: openssl rand -base64 16

wifi_ssid: "your-ssid"
