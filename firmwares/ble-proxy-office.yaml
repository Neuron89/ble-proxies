substitutions:
  device_name: ble-proxy-office
  friendly_name: BLE Proxy Office

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ESP32 Bluetooth proxy. v2 — Arduino framework + serial logs for first-flash diagnosability. Switch to esp-idf later if you ever need >5 concurrent BLE connections.

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO
  # Serial logs enabled (baud 115200) so you can plug USB and see panics if
  # this ever boot-loops again. Set baud_rate: 0 once everything's stable to
  # free the UART pins.

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_fallback_password

captive_portal:

bluetooth_proxy:
  active: true

# Minimal diagnostics — internal_temperature dropped; it's chip-variant-
# dependent and was the likely culprit of the v1 boot crash. Re-add later
# from individual sensors if you want the metric.
sensor:
  - platform: uptime
    name: Uptime
  - platform: wifi_signal
    name: WiFi signal
    update_interval: 60s

binary_sensor:
  - platform: status
    name: Online status
